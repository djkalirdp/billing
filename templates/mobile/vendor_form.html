{% extends 'mobile/base_mobile.html' %}
{% block title %}{{ action }} Vendor{% endblock %}
{% block page_title %}{{ action }} Vendor{% endblock %}

{% block topbar_actions %}
<a href="{{ url_for('vendors') }}" class="m-icon-btn"><i class="bi bi-arrow-left"></i></a>
{% endblock %}

{% block content %}
<form method="POST"
      action="{{ url_for('edit_vendor', vendor_id=vendor.id) if vendor else url_for('add_vendor') }}"
      id="vendorForm">
  <div class="m-card" style="margin:0 14px 12px;">
    <div class="m-card-header">
      <i class="bi bi-truck" style="color:var(--accent);font-size:18px;"></i>
      <span class="m-card-title">Vendor Details</span>
    </div>
    <div class="m-card-body">
      <div class="m-fg">
        <label class="m-label">Vendor Name <span style="color:red">*</span></label>
        <input type="text" name="name" class="m-input" required autofocus
               value="{{ vendor.name if vendor else '' }}" placeholder="e.g. Shree Traders" />
      </div>
      <div class="m-fg">
        <label class="m-label">GSTIN</label>
        <input type="text" name="gstin" class="m-input" maxlength="15"
               value="{{ vendor.gstin if vendor else '' }}" placeholder="15-char GST number" />
      </div>
      <div class="m-fg">
        <label class="m-label">Phone</label>
        <input type="tel" name="phone" class="m-input"
               value="{{ vendor.phone if vendor else '' }}" placeholder="9876543210" />
      </div>
      <div class="m-fg">
        <label class="m-label">Email</label>
        <input type="email" name="email" class="m-input"
               value="{{ vendor.email if vendor else '' }}" placeholder="vendor@example.com" />
      </div>
      <div class="m-fg">
        <label class="m-label">Address</label>
        <textarea name="address" class="m-input" rows="2" style="resize:none;"
                  placeholder="Full address">{{ vendor.address if vendor else '' }}</textarea>
      </div>
    </div>
  </div>
  <div style="padding:0 14px 24px;display:flex;flex-direction:column;gap:10px;">
    <button type="submit" class="m-btn m-btn-primary" id="saveBtn">
      <i class="bi bi-save2"></i> {{ 'Update' if vendor else 'Save' }} Vendor
    </button>
    <a href="{{ url_for('vendors') }}" class="m-btn m-btn-outline"><i class="bi bi-x"></i> Cancel</a>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('vendorForm').addEventListener('submit',function(){
  const btn=document.getElementById('saveBtn');
  btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
  btn.disabled=true;
});
</script>
{% endblock %}
