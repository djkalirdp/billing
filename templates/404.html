<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>404 — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#0f172a;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;}
    .code{font-family:'Syne',sans-serif;font-size:120px;font-weight:800;color:#1d4ed8;line-height:1;margin-bottom:8px;}
    .title{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin-bottom:12px;}
    .sub{font-size:15px;color:#94a3b8;margin-bottom:32px;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#2563eb;color:white;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;transition:background .18s;}
    .btn:hover{background:#1d4ed8;}
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <div class="title">Page Not Found</div>
    <p class="sub">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/dashboard" class="btn"><i class="bi bi-house"></i> Go to Dashboard</a>
  </div>
</body>
</html>
